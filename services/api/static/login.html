<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>登录 - facecheck</title>
  <link rel="stylesheet" href="/static/style.css?v=20260307-10" />
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card">
      <h1>facecheck 登录</h1>
      <p class="sub">请输入访问密码后进入签到系统</p>

      <form id="loginForm">
        <label class="field" for="passwordInput">
          <span>访问密码</span>
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="请输入访问密码" />
        </label>
        <div class="row gap">
          <button type="submit" class="btn primary">登录</button>
        </div>
      </form>

      <p id="loginMsg" class="muted"></p>
    </section>
  </main>

  <script src="/static/login.js?v=20260313-01"></script>
</body>
</html>
